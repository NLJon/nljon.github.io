<!DOCTYPE html>
<html>
<head>
    <script src="scripts.js"></script>
    <link rel="stylesheet" href="styles.css">
    <title>My Hobbies</title>

    <!-- Required for Bootstrap responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap first -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

    <iframe src="menu.html" style="width:100%; height:54px; border:none; display:block; overflow:hidden; position:sticky; top:0; z-index:1000"></iframe> 

    <center><h1>My Hobbies</h1></center>

    <div class="split left">

        <iframe 
            width="560" 
            height="315" 
            src="images/TF2-trailer.mp4" 
            title="TF2 Trailer" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen>
        </iframe>

    </div>

    <div class="split right">

        <table WIDTH="80%" align="center">
            <tr>
                <td WIDTH="250">Video Games</td>
                <td><img id="TF2_logo" onmouseover="SwapImageHover(this)" onmouseout="SwapImageHover(this)" src="images/Tf2-fight.png" HEIGHT="200" WIDTH="300"></td>
            </tr>
            <tr>
                <td>Riding Jetskis</td>
                <td><img id="jetski" onmouseover="SwapImageHover(this)" onmouseout="SwapImageHover(this)" src="images/jetski1.jpg" HEIGHT="200"></td>
            </tr>
            <tr>
                <td>Outdoors in Nature</td>
                <td><img id="nature" onmouseover="SwapImageHover(this)" onmouseout="SwapImageHover(this)" src="images/dog1.jpg" HEIGHT="200"></td>

            </tr>
        </table>

    </div>

</body>
</html>
